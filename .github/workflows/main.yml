name: Docker Test

on: [push] # This triggers the test every time you save code

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build the Docker image
        run: docker build -t my-hello-app .

      - name: Run the container
        run: docker run my-hello-app
